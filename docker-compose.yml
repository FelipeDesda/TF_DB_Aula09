services:
  mongo:
    image: mongo:7
    container_name: aula09_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo_data:/data/db
      - ./aula09_crud.js:/tmp/aula09_crud.js:ro

volumes:
  mongo_data:
